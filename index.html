<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرادود عباس الأعرجي</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');

*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:'Cairo',sans-serif;
  background:#000;
}

.wrapper{
  width:100%;
  max-width:1100px;
  padding:10px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  justify-items:center;
}

.card{
  background:rgba(255,255,255,.92);
  border-radius:10px;
  padding:4px;
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  width:100%;
  max-width:180px;
  border:1px solid rgba(0,0,0,0.2);
  transition:transform 0.2s;
}

.card:hover {
  transform:scale(1.02);
  box-shadow:0 4px 8px rgba(255,255,255,0.2);
}

.card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
}

.card-title{
  margin-top:4px;
  font-size:13px;
  color:#000;
  text-align:center;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.2;
  padding:2px 0;
}

#playerPage{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:100vh;
  background:#000;
  display:none;
  z-index:9999;
  overflow:hidden;
}

#youtubeFrame{
  width:100%;
  height:100%;
  border:none;
  position:relative;
  z-index:1;
}

#ytPoster{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  display:none;
}
</style>
</head>

<body>

<div class="wrapper" id="home">
  <div class="grid" id="channelsGrid"></div>
</div>

<div id="playerPage">
  <img id="ytPoster">
  <iframe id="youtubeFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>
const channelsData = `
يمه ذكريني
https://www.youtube.com/shorts/9kCAc74wC4s
هليت
https://www.youtube.com/shorts/hpVtQjla9_c
اذا مومثلي خادم صار ابني
https://www.youtube.com/shorts/hcjoqVCqKbc
نام برغد وتهنه
https://www.youtube.com/shorts/UfTCtmOZd7o
محرم 
https://www.youtube.com/shorts/qSeEjuamYdY

`;

const grid = document.getElementById("channelsGrid");

// دالة لاستخراج ID من أي رابط يوتيوب (عادي أو شورتس)
function getYouTubeId(url){
  // للشورتس: youtube.com/shorts/ID
  let regex = /youtube\.com\/shorts\/([^?&/]+)/;
  let match = url.match(regex);
  if(match) return match[1];
  
  // للروابط العادية
  regex = /(?:youtube\.com\/(?:.*v=|live\/)|youtu\.be\/)([^&?/]+)/;
  match = url.match(regex);
  return match ? match[1] : null;
}

const lines = channelsData.trim().split('\n').filter(l => l.trim() !== "");
for (let i = 0; i < lines.length; i += 2) {
    const title = lines[i].trim();
    const stream = lines[i+1]?.trim();
    if (title && stream) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.stream = stream;
        card.dataset.title = title;
        
        const ytId = getYouTubeId(stream);
        const img = ytId ? `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg` : '';
        card.innerHTML = `<img src="${img}"><div class="card-title">${title}</div>`;
        grid.appendChild(card);
    }
}

const cards = document.querySelectorAll('.card');
const playerPage = document.getElementById("playerPage");
const youtubeFrame = document.getElementById("youtubeFrame");
const ytPoster = document.getElementById("ytPoster");
const home = document.getElementById("home");

window.addEventListener('load', function() {
  const savedScroll = localStorage.getItem('scrollPosition');
  if (savedScroll) {
    setTimeout(() => {
      window.scrollTo({ top: parseInt(savedScroll), behavior: 'auto' });
      localStorage.removeItem('scrollPosition');
    }, 100);
  }
});

cards.forEach(card=>{
  card.onclick = ()=>{
    const ytId = getYouTubeId(card.dataset.stream);
    if(!ytId) return;
    localStorage.setItem('scrollPosition', window.scrollY);
    ytPoster.src = `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
    ytPoster.style.display = 'block';
    home.style.display = 'none';
    playerPage.style.display = 'block';
    youtubeFrame.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1`;
    youtubeFrame.onload = ()=>{ ytPoster.style.display = 'none'; };
    history.pushState({playing:true}, "");
  };
});

window.onpopstate = ()=>{
  if(playerPage.style.display === "block"){
    playerPage.style.display = 'none';
    home.style.display = 'block';
    youtubeFrame.src = "";
    ytPoster.style.display = 'none';
  }
};
</script>

</body>
</html>
